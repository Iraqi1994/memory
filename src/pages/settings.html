<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>
    <link rel="icon" type="image/svg+xml" href="/img/gaming-theme/card-back-gaming-theme.svg" />
  </head>
  <body>
    <div class="settings-container">
      <div class="settings-forms">
        <h1>Settings</h1>

        <form>
          <legend>
            <img src="/img/palette.svg" alt="" />
            Game themes
          </legend>

          <label>
            <input type="radio" name="theme" value="codeTheme" />
            Code vibes theme
          </label>

          <label>
            <input type="radio" name="theme" value="gamingTheme" />
            Gaming theme
          </label>
        </form>

        <form>
          <legend>
            <img src="/img/chess-pawn.svg" alt="" />
            Choose Player
          </legend>

          <label>
            <input type="radio" name="player" value="blue" />
            Blue
          </label>

          <label>
            <input type="radio" name="player" value="orange" />
            Orange
          </label>
        </form>

        <form>
          <legend>
            <img src="/img/board.svg" alt="" />
            Board Size
          </legend>

          <label>
            <input type="radio" name="boardSize" value="16" />
            16 cards
          </label>

          <label>
            <input type="radio" name="boardSize" value="24" />
            24 cards
          </label>

          <label>
            <input type="radio" name="boardSize" value="36" />
            36 cards
          </label>
        </form>
      </div>

      <div class="theme-preview">
        <img id="preview-image" src="" alt="Theme preview" />

        <div class="settings-summary">
          <div class="settings-summary__choices">
            <span id="summary-theme">Theme</span>
            <img src="/img/slash.svg" alt="/" class="settings-summary__slash" />
            <span id="summary-player">Player</span>
            <img src="/img/slash.svg" alt="/" class="settings-summary__slash" />
            <span id="summary-boardSize">Board Size</span>
          </div>

          <a href="../pages/game.html" id="start-button" class="button button--disabled">
            <img src="/img/smart-display.svg" alt="" class="button__icon button__icon--start" />
            <span class="button__text">Start</span>
          </a>
        </div>
      </div>
    </div>

    <script type="module" src="../scripts/settings.ts"></script>
  </body>
</html>
