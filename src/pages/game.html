<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/img/gaming-theme/card-back-gaming-theme.svg" />
    <title>Memory</title>
  </head>
  <body onload="init()">
    <header>
      <div class="player-container">
        <div class="player player-blue">
          <img src="/img/code-theme/blue-code-theme.svg" alt="Blue Player" />
          <div class="player-name">Blue</div>
          <div id="scoreBlue">0</div>
        </div>
        <div class="player player-orange">
          <img src="/img/code-theme/orange-code-theme.svg" alt="Orange Player" />
          <div class="player-name">Orange</div>
          <div id="scoreOrange">0</div>
        </div>
      </div>
      <div class="current-player">
        <span>Current Player: </span>
        <img id="currentPlayerImg" src="/img/code-theme/blue-code-theme.svg" alt="Blue Player" />
      </div>
      <button class="button"><img src="/img/exit-game.svg" alt="Exit Game" /> Exit Game</button>
    </header>
    <section id="field"></section>
    <div class="game-over-overlay" id="gameOverOverlay">
      <div class="game-over-overlay__content">
        <div class="game-over-overlay__title-wrapper">
          <div class="game-over-overlay__title--back">GAME OVER</div>
          <div class="game-over-overlay__title--front">GAME OVER</div>
        </div>
        <div class="game-over-overlay__final-score-label">Final score</div>
        <div class="player-container">
          <div class="player player-blue">
            <img id="gameOverBlueImg" src="/img/code-theme/blue-code-theme.svg" alt="Blue Player" />
            <div class="player-name">Blue</div>
            <div id="gameOverScoreBlue">0</div>
          </div>
          <div class="player player-orange">
            <img id="gameOverOrangeImg" src="/img/code-theme/orange-code-theme.svg" alt="Orange Player" />
            <div class="player-name">Orange</div>
            <div id="gameOverScoreOrange">0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="game-overlay" id="gameOverlay">
      <div class="game-overlay__content">
        <img class="game-overlay__top-img" id="overlayTopImg" src="" alt="" />
        <div class="game-overlay__subtitle" id="overlaySubtitle">The winner is</div>
        <div class="game-overlay__title" id="overlayTitle"></div>
        <img class="game-overlay__winner-img" id="overlayWinnerImg" src="" alt="" />
        <div class="game-overlay__draw" id="overlayDraw" style="display: none">
          <div class="game-overlay__draw-subtitle">It's a</div>
          <div class="game-overlay__draw-title-wrapper">
            <div class="game-overlay__draw-title--back">DRAW</div>
            <div class="game-overlay__draw-title--front">DRAW</div>
          </div>
          <img class="game-overlay__draw-icon" id="overlayDrawIcon" src="" alt="Draw" />
        </div>
        <a href="../pages/settings.html" class="button">Play Again</a>
      </div>
    </div>
    <div class="exit-popup-backdrop" id="exitPopupBackdrop">
      <div class="exit-popup" id="exitPopup">
        <p class="exit-popup__question">Are you sure you want to quit the game?</p>
        <div class="exit-popup__buttons">
          <button class="button button--inverted" id="backToGameButton">Back to game</button>
          <a href="../pages/settings.html" class="button">Exit Game</a>
        </div>
      </div>
    </div>
    <script type="module">
      import { init } from "../scripts/game.ts";
      window.init = init;
    </script>
  </body>
</html>
